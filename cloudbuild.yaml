steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/acp-mcp-server:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/acp-mcp-server:latest'
      - '-f'
      - 'Dockerfile.production'
      - '.'

  # Push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/acp-mcp-server:$SHORT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'acp-mcp-server'
      - '--image=gcr.io/$PROJECT_ID/acp-mcp-server:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=60s'
      - '--update-secrets=PLATFORM_SERVICE_TOKEN=acp-mcp-server-platform-service-token:latest'
      - '--update-secrets=PLATFORM_URL=acp-mcp-server-platform-url:latest'
      - '--update-secrets=CORS_ORIGIN=acp-mcp-server-cors-origin:latest'
      - '--set-env-vars=ACP_MCP_LOG_LEVEL=debug'
      - '--set-env-vars=ACP_MCP_DEBUG=true'

images:
  - 'gcr.io/$PROJECT_ID/acp-mcp-server:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/acp-mcp-server:latest'

options:
  machineType: 'N1_HIGHCPU_8'
